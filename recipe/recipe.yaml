context:
  name: scitacean
  version: "26.7.1"
  python_min: "3.11"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/scitacean-${{ version }}.tar.gz
  sha256: 37e1970c7101d7abe2a8bb536de93b1fcf9d7f8b23da4ae62b9510c18a417387

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=77
    - setuptools-scm >=8.0
  run:
    - python >=${{ python_min }}
    - email-validator >=2
    - httpx >=0.24
    - paramiko >=3
    - pydantic >=2

tests:
  - python:
      imports:
        - scitacean
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://pypi.org/project/scitacean/
  summary: High-level interface for SciCat
  repository: https://github.com/SciCatProject/scitacean
  documentation: https://scicatproject.github.io/scitacean/
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jl-wynen
    - nitrosx
